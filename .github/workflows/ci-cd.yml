name: CI/CD — PowerPoint Agent

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Only one deployment runs at a time; PRs cancel on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.8.0"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ────────────────────────────────────────────
  # 1. Lint, test & deploy the Python backend
  # ────────────────────────────────────────────
  backend-test:
    name: Backend — lint, test & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/agent_loop/requirements.txt
            backend/upload_logo/requirements.txt
            backend/start_job/requirements.txt
            backend/build_slides/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r agent_loop/requirements.txt
          pip install -r upload_logo/requirements.txt
          pip install -r start_job/requirements.txt
          pip install -r build_slides/requirements.txt

      - name: Lint with ruff
        run: ruff check agent_loop upload_logo start_job

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy agent_loop
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pip install -r agent_loop/requirements.txt -t agent_loop/
          cd agent_loop && zip -r ../agent_loop.zip . && cd ..
          aws lambda update-function-code \
            --function-name pptx-agent-agent-loop \
            --zip-file fileb://agent_loop.zip \
            --no-cli-pager

      - name: Deploy start_job
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pip install -r start_job/requirements.txt -t start_job/
          cd start_job && zip -r ../start_job.zip . && cd ..
          aws lambda update-function-code \
            --function-name pptx-agent-start-job \
            --zip-file fileb://start_job.zip \
            --no-cli-pager

      - name: Deploy upload_logo
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pip install -r upload_logo/requirements.txt -t upload_logo/
          cd upload_logo && zip -r ../upload_logo.zip . && cd ..
          aws lambda update-function-code \
            --function-name pptx-agent-upload-logo \
            --zip-file fileb://upload_logo.zip \
            --no-cli-pager

      - name: Deploy build_slides
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pip install -r build_slides/requirements.txt -t build_slides/
          cd build_slides && zip -r ../build_slides.zip . && cd ..
          aws lambda update-function-code \
            --function-name pptx-agent-build-slides \
            --zip-file fileb://build_slides.zip \
            --no-cli-pager


  # ────────────────────────────────────────────
  # 2. Build & test the React frontend
  # ────────────────────────────────────────────
  frontend-build:
    name: Frontend — install, lint & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          VITE_GENERATE_URL: ${{ secrets.GENERATE_URL }}
          VITE_UPLOAD_LOGO_URL: ${{ secrets.UPLOAD_LOGO_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SETTINGS_TABLE: ${{ secrets.SUPABASE_SETTINGS_TABLE }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          aws s3 sync build/ s3://${{ secrets.TF_FRONTEND_BUCKET }}/ --delete

  # ────────────────────────────────────────────
  # 3. Terraform plan (on every PR)
  # ────────────────────────────────────────────
  terraform-plan:
    name: Terraform — plan
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v7

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: |
          terraform plan \
            -var="frontend_bucket_name=${{ secrets.TF_FRONTEND_BUCKET }}" \
            -var="storage_bucket_name=${{ secrets.TF_STORAGE_BUCKET }}" \
            -var="supabase_url=${{ secrets.SUPABASE_URL }}" \
            -var="supabase_anon_key=${{ secrets.SUPABASE_ANON_KEY }}" \
            -var="supabase_service_role_key=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -var="supabase_settings_table=${{ secrets.SUPABASE_SETTINGS_TABLE }}" \
            -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 1