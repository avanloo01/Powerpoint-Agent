name: CI/CD — PowerPoint Agent

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Only one deployment runs at a time; PRs cancel on new push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: "1.8.0"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────
  # 1. Lint & test the Python backend
  # ────────────────────────────────────────────
  backend-test:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            backend/generate_pptx/requirements.txt
            backend/upload_logo/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff pytest
          pip install -r generate_pptx/requirements.txt
          pip install -r upload_logo/requirements.txt

      - name: Lint with ruff
        run: ruff check generate_pptx upload_logo

  # ────────────────────────────────────────────
  # 2. Build & test the React frontend
  # ────────────────────────────────────────────
  frontend-build:
    name: Frontend — install, lint & build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build
        env:
          VITE_GENERATE_URL: ${{ secrets.GENERATE_URL }}
          VITE_UPLOAD_LOGO_URL: ${{ secrets.UPLOAD_LOGO_URL }}
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_SUPABASE_SETTINGS_TABLE: ${{ secrets.SUPABASE_SETTINGS_TABLE }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ────────────────────────────────────────────
  # 4. Deploy (only on push to main)
  # ────────────────────────────────────────────
  deploy:
    name: Deploy — Lambda deploy + S3 sync
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for Lambda packaging)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda dependencies into package directory
        run: |
          pip install \
            -r backend/generate_pptx/requirements.txt \
            -t backend/generate_pptx/
          pip install \
            -r backend/upload_logo/requirements.txt \
            -t backend/upload_logo/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package and deploy generate_pptx Lambda
        run: |
          cd backend/generate_pptx
          zip -r ../../generate_pptx.zip .
          aws lambda update-function-code \
            --function-name pptx-agent-generate-pptx \
            --zip-file fileb://../../generate_pptx.zip

      - name: Package and deploy upload_logo Lambda
        run: |
          cd backend/upload_logo
          zip -r ../../upload_logo.zip .
          aws lambda update-function-code \
            --function-name pptx-agent-upload-logo \
            --zip-file fileb://../../upload_logo.zip

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: frontend-build
          path: frontend/dist

      - name: Deploy frontend to S3
        run: |
          aws s3 sync frontend/dist/ \
            s3://${{ secrets.TF_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "*.html"

          # HTML files must not be cached so the browser always fetches the latest
          aws s3 sync frontend/dist/ \
            s3://${{ secrets.TF_FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "no-cache,no-store,must-revalidate" \
            --include "*.html" \
            --exclude "*"
